<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <link rel="shortcut icon" href="../../assets/logo.png" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <title>Finalaca - Simulação</title>
</head>

<body>
    <div class="sidebar">
        <div class="logo">
            <div class="rounded-logo">
                <img src="../../assets/logo.png" alt="Logo Finalaca">
            </div>
            <h3>Finalaca</h3>
        </div>

        <nav>
            <a href="../../index.html"><i data-lucide="layout-dashboard" class="icon dashboard"></i>Dashboard</a>
            <a href="#"><i data-lucide="package" class="icon stock"></i>Estoque</a>
            <a href="/interface/pages/simulation/index.html" class="active"><i data-lucide="calculator"
                    class="icon calculator"></i>Simulação</a>
            <a href="#"><i data-lucide="shopping-cart" class="icon shopping"></i>Pedidos</a>
            <a href="#"><i data-lucide="hammer" class="icon projects"></i>Projetos</a>
            <a href="#"><i data-lucide="users" class="icon clients"></i>Clientes</a>
            <a href="#"><i data-lucide="armchair" class="icon armchair"></i>Catálogo de Produtos</a>
            <a href="#"><i data-lucide="receipt-text" class="icon budget"></i>Orçamentos</a>
            <a href="#"><i data-lucide="users-round" class="icon team"></i>Equipe</a>
            <a href="#"><i data-lucide="chart-column" class="icon report"></i>Relatórios</a>
            <a href="#"><i data-lucide="settings" class="icon config"></i>Configurações</a>
        </nav>

        <div class="perfil">
            <div class="photo">
                <p>VN</p>
            </div>
            <div class="name-box">
                <p class="name">Vinnicius N.</p>
                <p class="function">Administrador</p>
            </div>
        </div>
    </div>

    <header>
        <div class="left-header">
            <div class="path">
                <span>Finalaca</span>
                <i data-lucide="chevron-right"></i>
                <span>Simulação</span>
            </div>

            <div class="inputPesquisa">
                <i data-lucide="search"></i>
                <input type="text" placeholder="Buscar pedidos, clientes...">
            </div>
        </div>
        <div class="infos">
            <p class="date">26 Jun, 2026</p>
            <div class="perfil">
                <div class="photo">
                    <p>VN</p>
                </div>
                <div class="name-box">
                    <p class="name">Vinnicius N.</p>
                </div>
                <i data-lucide="chevron-down"></i>
            </div>
        </div>
    </header>

    <main>
        <div class="title-section">
            <div class="main-content">
                <h1>Nova Simulação</h1>
                <p>Preencha os dados do projeto para calcular custos e precificação.</p>
            </div>
            <button>Limpar tudo</button>
        </div>

        <section class="materials"></section>
    </main>
</body>

<script src="script.js"></script>

</html>
